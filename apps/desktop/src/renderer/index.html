<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme boot script must run before body to prevent flash -->
    <script type="module" src="/theme-boot.js"></script>
    <!--
      Content Security Policy
      https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP

      Local-only build: no cloud or telemetry hosts. The renderer talks to
      the main process over trpc-over-IPC (not the network), so connect-src needs
      no remote origins — only ws/wss for the Vite HMR socket in dev. The built-in
      browser / <webview> panes load arbitrary web pages, so frame-src and img-src
      stay permissive; that content is isolated in <webview>, not this document.

      - default-src 'self': only same-origin resources by default
      - script-src 'self' 'wasm-unsafe-eval': same-origin scripts + WASM (ghostty-web / xterm)
      - style-src 'self' 'unsafe-inline': same-origin + inline styles (CSS-in-JS)
      - connect-src 'self' data: blob: ws: wss:: IPC-backed trpc + dev HMR socket + data/blob URIs
      - img-src 'self' data: blob: https: http:: favicons, webview thumbnails, disk/web avatars, attachment previews
      - font-src 'self': same-origin fonts
      - frame-src https: http: data: blob:: built-in browser panes load any URL
      - child-src 'self' blob:: same-origin + blob workers
      - object-src 'none': no plugins/embeds
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' data: blob: ws: wss:; img-src 'self' data: blob: https: http:; font-src 'self'; frame-src https: http: data: blob:; child-src 'self' blob:; object-src 'none';" />
  </head>

  <body>
    <app></app>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
